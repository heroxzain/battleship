<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BattleShip</title>
<script defer src="main.js"></script></head>
<body>
    <header class="game-header">
        <h1 class="logo">Battleship</h1>

        <div class="status-display">
            <h2 id="game-status">Place your ships to begin!</h2>
        </div>
    </header>

    <main class="game-container">
        <div class="boards-container">
            <div class="ships-wrapper">
                <div id="player-ships" class="remaining-ships"></div>
                <div class="board-wrapper">
                    <h3 class="board-title">You</h3>
                    <div id="player-board" class="game-board"></div> 
                </div>
            </div>

            <div class="ships-wrapper">
                <div class="board-wrapper">
                    <h3 class="board-title">Enemy Waters</h3>
                    <div id="computer-board" class="game-board"></div>
                </div>
                <div id="computer-ships" class="remaining-ships"></div>
            </div>
        </div>

        <div class="controls">
            <button id="start-btn" class="primary-btn">Start</button>
            <button id="randomize-btn" class="primary-btn">Randomize</button>
        </div>
    </main>

    <footer class="game-footer">
        <p>Made with ❤️ by HEROxZAIN for The Odin Project</p>
    </footer>
</body>
</html>
